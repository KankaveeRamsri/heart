<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: white;
    }

    canvas {
      position: absolute;
    }

    .text {
      position: absolute;
      bottom: 80px;
      text-align: center;
      animation: fadeIn 3s ease forwards;
      opacity: 0;
    }

    .text h1 {
      font-size: 2rem;
      margin: 0;
      color: #ff4d6d;
    }

    .text p {
      font-size: 1rem;
      color: #ffd6df;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <canvas id="heart"></canvas>

  <div class="text">
    <h1>For You ❤️</h1>
    <p>หัวใจดวงนี้ให้เธอนะ</p>
  </div>

  <script>
    const canvas = document.getElementById("heart");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    function hearta(k) {
      return 15 * Math.pow(Math.sin(k), 3);
    }

    function heartb(k) {
      return 12 * Math.cos(k)
        - 5 * Math.cos(2 * k)
        - 2 * Math.cos(3 * k)
        - Math.cos(4 * k);
    }

    let i = 0;

    function draw() {
      if (i < 6000) {
        const x = cx + hearta(i) * 20;
        const y = cy - heartb(i) * 20;

        ctx.beginPath();

        // จากจุดกลาง (0,0) → ไปหัวใจ (เหมือน turtle)
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);

        ctx.strokeStyle = "red";
        ctx.lineWidth = 1.5;

        ctx.stroke();

        i++;

        requestAnimationFrame(draw);
      }
    }

    draw();
  </script>
</body>
</html>
